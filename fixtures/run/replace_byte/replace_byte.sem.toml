contract_version = "0.1"

[function]
name = "replace_byte"
summary = "Replace occurrences of a needle byte in a buffer; return how many were replaced"

[[function.parameters]]
name = "buffer"
type = "ptr<u8>"
role = "input"

[[function.parameters]]
name = "length"
type = "usize"
role = "input"

[[function.parameters]]
name = "needle"
type = "u8"
role = "input"

[[function.parameters]]
name = "replacement"
type = "u8"
role = "input"

[[function.returns]]
name = "count"
type = "usize"

[[function.requires]]
expression = "length <= 4096"
reason = "Arbitrary safety limit for this fixture."

[[function.ensures]]
expression = "count <= length"

[[function.effects]]
kind = "memory_read"
region = "buffer[0..length]"

[[function.effects]]
kind = "memory_write"
region = "buffer[0..length]"

[function.constraints]
no_heap = true
no_recursion = true
bounded_stack_bytes = 128
