contract_version = "0.1"

[function]
name = "count_byte"
summary = "Count occurrences of a byte in a buffer"

[[function.parameters]]
name = "buffer"
type = "ptr<const u8>"
role = "input"

[[function.parameters]]
name = "length"
type = "usize"
role = "input"

[[function.parameters]]
name = "needle"
type = "u8"
role = "input"

[[function.returns]]
name = "count"
type = "usize"

[[function.requires]]
expression = "length <= 4096"
reason = "Arbitrary safety limit for this fixture."

[[function.ensures]]
expression = "count <= length"

[[function.effects]]
kind = "memory_read"
region = "buffer[0..length]"

[function.constraints]
no_heap = true
no_recursion = true
bounded_stack_bytes = 128
