schema_version = "0.1"
task_id = "sum-i64-v1"
artifact_kind = "callable-function"
target = "x86_64-unknown-linux-gnu"

[entry]
symbol = "sum_i64"
abi = "sysv64"

[inputs.values]
kind = "pointer"
element = "i64"
access = "read"
length_from = "length"
nullable = false

[inputs.length]
kind = "usize"

[output]
kind = "i64"

[behavior]
summary = "Return the wrapping sum of all input elements."
integer_overflow = "wrap"
empty_input_result = 0

[capabilities]
syscalls = []
imports = []
heap = false
filesystem = false
network = false
environment = false
clock = false
random = false

[memory]
max_stack_bytes = 128
allow_global_writable = false
allow_self_modifying_code = false

[instructions]
required_features = ["x86-64-baseline"]
forbidden_mnemonics = []
allow_unknown_semantics = false

[verification]
require_complete_lowering = true
require_abi_check = true
require_object_inspection = true
require_behavioral_tests = true
require_reproducible_build = true

[budgets]
max_candidates = 4
max_repairs_per_candidate = 2
max_wall_time_seconds = 300
max_model_tokens = 24000
max_no_progress_iterations = 1

[delivery]
include_source = true
include_object = true
include_binary = false
include_evidence = true

[[tests]]
name = "empty"
expected = 0

[tests.input]
values = []
length = 0

[[tests]]
name = "positive"
expected = 10

[tests.input]
values = [1, 2, 3, 4]
length = 4

[[tests]]
name = "mixed"
expected = 7

[tests.input]
values = [-5, 2, 10]
length = 3
