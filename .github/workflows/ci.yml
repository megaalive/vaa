  # H3: live HlaX64 emit must match committed candidate, then Gate smokes.
  hlax64-bridge:
    name: HlaX64 emit + SemASM Gate (Win64)
    runs-on: windows-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v6

      - name: Checkout SemASM
        uses: actions/checkout@v6
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM Horizon Closeout tip (H0-H6; decode/lower stay partial).
          ref: ed447fba0496e417cc6f74c707ce5b9b62dd3f14

      - name: Checkout HlaX64
        uses: actions/checkout@v6
        with:
          repository: megaalive/hlax64
          path: hlax64
          # Pin: min_usize/max_usize SemASM/VAA bridge leaves (Thin Th8).
          ref: 90cbf3b24faef253467a43ef270656dc6de49f0b

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install NASM and LLVM (lld-link)
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        shell: pwsh
        run: |
          $semasmBin = Join-Path $env:GITHUB_WORKSPACE "semasm\target\release"
          if (-not (Test-Path (Join-Path $semasmBin "semasm.exe"))) {
            throw "semasm.exe missing under $semasmBin"
          }
          echo $semasmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$semasmBin;$env:PATH"
          Get-Command semasm | Format-List
          semasm --version

      - name: Doctor + live status compare (R6)
        shell: pwsh
        run: ./scripts/ci-doctor-live-probe.ps1

      - name: Emit HlaX64 NASM and compare to fixture
        shell: pwsh
        env:
          HLAX64_ROOT: ${{ github.workspace }}/hlax64
        run: |
          foreach ($leaf in @(
            @{ Name = "sum_i64"; Script = "regen-hlax64-sum_i64.ps1"; Source = "hlax64/examples/interop/semasm-vaa/sum_i64/sum_i64.hla64"; Fixture = "fixtures/ingest/hlax64_sum_i64/candidate.asm" },
            @{ Name = "find_last_byte"; Script = "regen-hlax64-find_last_byte.ps1"; Source = "hlax64/examples/interop/semasm-vaa/find_last_byte/find_last_byte.hla64"; Fixture = "fixtures/ingest/hlax64_find_last_byte/candidate.asm" }
            @{ Name = "memcmp"; Script = "regen-hlax64-memcmp.ps1"; Source = "hlax64/examples/interop/semasm-vaa/memcmp/memcmp.hla64"; Fixture = "fixtures/ingest/hlax64_memcmp/candidate.asm" }
            @{ Name = "replace_byte"; Script = "regen-hlax64-replace_byte.ps1"; Source = "hlax64/examples/interop/semasm-vaa/replace_byte/replace_byte.hla64"; Fixture = "fixtures/ingest/hlax64_replace_byte/candidate.asm" }
            @{ Name = "count_byte"; Script = "regen-hlax64-count_byte.ps1"; Source = "hlax64/examples/interop/semasm-vaa/count_byte/count_byte.hla64"; Fixture = "fixtures/ingest/hlax64_count_byte/candidate.asm" }
            @{ Name = "find_first_byte"; Script = "regen-hlax64-find_first_byte.ps1"; Source = "hlax64/examples/interop/semasm-vaa/find_first_byte/find_first_byte.hla64"; Fixture = "fixtures/ingest/hlax64_find_first_byte/candidate.asm" }
            @{ Name = "memset"; Script = "regen-hlax64-memset.ps1"; Source = "hlax64/examples/interop/semasm-vaa/memset/memset.hla64"; Fixture = "fixtures/ingest/hlax64_memset/candidate.asm" }
            @{ Name = "memcpy"; Script = "regen-hlax64-memcpy.ps1"; Source = "hlax64/examples/interop/semasm-vaa/memcpy/memcpy.hla64"; Fixture = "fixtures/ingest/hlax64_memcpy/candidate.asm" }
            @{ Name = "min_usize"; Script = "regen-hlax64-min_usize.ps1"; Source = "hlax64/examples/interop/semasm-vaa/min_usize/min_usize.hla64"; Fixture = "fixtures/ingest/hlax64_min_usize/candidate.asm" }
            @{ Name = "max_usize"; Script = "regen-hlax64-max_usize.ps1"; Source = "hlax64/examples/interop/semasm-vaa/max_usize/max_usize.hla64"; Fixture = "fixtures/ingest/hlax64_max_usize/candidate.asm" }
          )) {
            $tmp = Join-Path $env:RUNNER_TEMP ("hlax64-" + $leaf.Name + ".asm")
            dotnet run --project hlax64/src/HlaX64.Cli --no-launch-profile -- emit-nasm `
              $leaf.Source `
              --target windows-x64-msabi --output-kind shared-library -o $tmp
            $committed = (Get-Content -Raw $leaf.Fixture) -replace "`r`n", "`n"
            $emitted = (Get-Content -Raw $tmp) -replace "`r`n", "`n"
            if ($committed -ne $emitted) {
              Write-Error "Committed $($leaf.Fixture) drifts from HlaX64 emit-nasm. Run scripts/$($leaf.Script)"
            }
            Write-Host "$($leaf.Name) candidate.asm matches HlaX64 emit"
          }

      - name: Gate ingest + Gate-2 verify for hlax64 leaves
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/vaa-transparency/hlax64-gate1 | Out-Null
          ./scripts/ci-gate-sign-setup.ps1 -PublicKeyOut target/vaa-transparency/hlax64-gate1/public_key.txt
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_sum_i64_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_sum_i64_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_find_last_byte_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_find_last_byte_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_memcmp_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_memcmp_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_replace_byte_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_replace_byte_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_count_byte_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_count_byte_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_find_first_byte_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_find_first_byte_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_memset_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_memset_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_memcpy_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_memcpy_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_min_usize_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_min_usize_win64_verified -- --ignored --nocapture
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_max_usize_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_max_usize_win64_verified -- --ignored --nocapture

      - name: Export + verify-transparency (HlaX64 Gate-1)
        shell: pwsh
        run: |
          ./scripts/ci-gate-transparency.ps1 `
            -RunBase target/vaa-gate1-hlax64-runs `
            -OutDir target/vaa-transparency/hlax64-gate1 `
            -PublicKeySrc target/vaa-transparency/hlax64-gate1/public_key.txt

      - name: Upload HlaX64 Gate-1 transparency artifact
        uses: actions/upload-artifact@v6
        with:
          name: hlax64-gate1-transparency
          path: target/vaa-transparency/hlax64-gate1/
          if-no-files-found: error

  # Gate-1 Linux: live SemASM Incomplete smoke (count_byte/sysv64, no --allow-execution).
  # VAA+SemASM smoke on the pinned SemASM SHA â€” not a claim SemASM Linux is upstream CI-verified.
  semasm-gate1-linux:
    name: Gate-1 SemASM Incomplete (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v6

      - name: Checkout SemASM
        uses: actions/checkout@v6
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM Horizon Closeout tip (H0-H6; decode/lower stay partial).
          ref: ed447fba0496e417cc6f74c707ce5b9b62dd3f14

      - name: Install NASM, LLVM (ld.lld), and qemu-user
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm lld qemu-user
          command -v qemu-x86_64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        run: |
          SEMASM_BIN="${GITHUB_WORKSPACE}/semasm/target/release"
          test -x "${SEMASM_BIN}/semasm"
          echo "${SEMASM_BIN}" >> "$GITHUB_PATH"
          export PATH="${SEMASM_BIN}:$PATH"
          command -v semasm
          semasm --version

      - name: Doctor + live status compare (R6)
        run: |
          chmod +x scripts/ci-doctor-live-probe.sh scripts/ci-gate-sign-setup.sh scripts/ci-gate-transparency.sh
          ./scripts/ci-doctor-live-probe.sh

      - name: Record tool versions
        run: |
          nasm --version
          ld.lld --version || lld --version
          qemu-x86_64 --version | head -n1

      - name: Gate-1 Linux signed ingest + Incomplete verify
        run: |
          mkdir -p target/vaa-transparency/gate1-linux
          # Source so VAA_SEAL_* exports apply to cargo test in this step
          # (GITHUB_ENV only affects subsequent steps).
          # shellcheck disable=SC1091
          source ./scripts/ci-gate-sign-setup.sh target/vaa-transparency/gate1-linux/public_key.txt
          cargo test --test semasm_gate1_smoke linux -- --ignored --nocapture

      - name: Export + verify-transparency (Gate-1 Linux)
        run: |
          ./scripts/ci-gate-transparency.sh \
            --run-base target/vaa-gate1-linux-runs \
            --out-dir target/vaa-transparency/gate1-linux \
            --public-key-src target/vaa-transparency/gate1-linux/public_key.txt

      - name: Upload Gate-1 Linux transparency artifact
        uses: actions/upload-artifact@v6
        with:
          name: gate1-linux-transparency
          path: target/vaa-transparency/gate1-linux/
          if-no-files-found: error

  # Gate-2 Linux: opt-in behavioral Verified (count_byte sysv64 + --allow-execution).
  semasm-gate2-linux:
    name: Gate-2 SemASM Verified (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v6

      - name: Checkout SemASM
        uses: actions/checkout@v6
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM Horizon Closeout tip (H0-H6; decode/lower stay partial).
          ref: ed447fba0496e417cc6f74c707ce5b9b62dd3f14

      - name: Install NASM, LLVM (ld.lld), and qemu-user
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm lld qemu-user
          command -v qemu-x86_64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        run: |
          SEMASM_BIN="${GITHUB_WORKSPACE}/semasm/target/release"
          test -x "${SEMASM_BIN}/semasm"
          echo "${SEMASM_BIN}" >> "$GITHUB_PATH"
          export PATH="${SEMASM_BIN}:$PATH"
          command -v semasm
          semasm --version

      - name: Doctor + live status compare (R6)
        run: |
          chmod +x scripts/ci-doctor-live-probe.sh scripts/ci-gate-sign-setup.sh scripts/ci-gate-transparency.sh
          ./scripts/ci-doctor-live-probe.sh

      - name: Gate-2 Linux signed ingest + Verified
        run: |
          mkdir -p target/vaa-transparency/gate2-linux
          # Source so VAA_SEAL_* exports apply to cargo test in this step.
          # qemu-x86_64 is preferred over broken SemASM __native__ on Linux.
          # shellcheck disable=SC1091
          source ./scripts/ci-gate-sign-setup.sh target/vaa-transparency/gate2-linux/public_key.txt
          cargo test --test semasm_gate2_smoke linux -- --ignored --nocapture

      - name: Export + verify-transparency (Gate-2 Linux)
        run: |
          ./scripts/ci-gate-transparency.sh \
            --run-base target/vaa-gate2-linux-runs \
            --out-dir target/vaa-transparency/gate2-linux \
            --public-key-src target/vaa-transparency/gate2-linux/public_key.txt

      - name: Upload Gate-2 Linux transparency artifact
        uses: actions/upload-artifact@v6
        with:
          name: gate2-linux-transparency
          path: target/vaa-transparency/gate2-linux/
          if-no-files-found: error
