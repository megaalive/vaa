name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features
      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # P8-F: fail-closed parser fuzz smoke (not a security certification).
  fuzz:
    name: Fuzz smoke (PR-022)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz smoke (30s each target)
        run: |
          set -euo pipefail
          for t in task_toml seal_envelope transparency_doc cache_verification_record; do
            echo "::group::fuzz $t"
            cargo +nightly fuzz run "$t" -- -max_total_time=30 -max_len=4096
            echo "::endgroup::"
          done

  # P8-K: SoftHSM2 PKCS#11 live signer smoke (Linux only; not hardware HSM).
  pkcs11-softhsm:
    name: SoftHSM PKCS#11 smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install SoftHSM2
        run: sudo apt-get update && sudo apt-get install -y softhsm2
      - name: Configure SoftHSM token
        run: |
          set -euo pipefail
          TOK="${RUNNER_TEMP}/softhsm/tokens"
          mkdir -p "$TOK"
          CONF="${RUNNER_TEMP}/softhsm/softhsm2.conf"
          printf 'directories.tokendir = %s\nobjectstore.backend = file\n' "$TOK" > "$CONF"
          export SOFTHSM2_CONF="$CONF"
          echo "SOFTHSM2_CONF=${CONF}" >> "$GITHUB_ENV"
          MODULE=""
          for p in /usr/lib/softhsm/libsofthsm2.so /usr/lib/x86_64-linux-gnu/softhsm/libsofthsm2.so; do
            if [ -f "$p" ]; then MODULE="$p"; break; fi
          done
          test -n "$MODULE"
          echo "VAA_HSM_MODULE=${MODULE}" >> "$GITHUB_ENV"
          softhsm2-util --init-token --free --label vaa-ci --pin 1234 --so-pin 5678
      - name: SoftHSM round-trip test
        env:
          VAA_PKCS11_LIVE: "1"
          VAA_HSM_PIN: "1234"
          VAA_HSM_SO_PIN: "5678"
          VAA_HSM_KEY_LABEL: vaa
        run: cargo test --features pkcs11 softhsm_live_round_trip -- --nocapture

  # Gate-1: live SemASM Incomplete smoke (count_byte Win64, no --allow-execution).
  # This is NOT a Verified vertical slice â€” see docs/progress.md.
  semasm-gate1:
    name: Gate-1 SemASM Incomplete (Win64)
    runs-on: windows-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v6

      - name: Checkout SemASM
        uses: actions/checkout@v6
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM Horizon Closeout tip (H0-H6; decode/lower stay partial).
          ref: ed447fba0496e417cc6f74c707ce5b9b62dd3f14

      - name: Install NASM and LLVM (lld-link)
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        shell: pwsh
        run: |
          $semasmBin = Join-Path $env:GITHUB_WORKSPACE "semasm\target\release"
          if (-not (Test-Path (Join-Path $semasmBin "semasm.exe"))) {
            throw "semasm.exe missing under $semasmBin"
          }
          echo $semasmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$semasmBin;$env:PATH"
          Get-Command semasm | Format-List
          semasm --version

      - name: Doctor + live status compare (R6)
        shell: pwsh
        run: ./scripts/ci-doctor-live-probe.ps1

      - name: Record tool versions
        shell: pwsh
        run: |
          nasm --version
          lld-link --version

      - name: Gate-1 signed ingest + Incomplete verify
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/vaa-transparency/gate1 | Out-Null
          ./scripts/ci-gate-sign-setup.ps1 -PublicKeyOut target/vaa-transparency/gate1/public_key.txt
          cargo test --test semasm_gate1_smoke -- --ignored --nocapture

      - name: Export + verify-transparency (Gate-1)
        shell: pwsh
        run: |
          ./scripts/ci-gate-transparency.ps1 `
            -RunBase target/vaa-gate1-runs `
            -OutDir target/vaa-transparency/gate1 `
            -PublicKeySrc target/vaa-transparency/gate1/public_key.txt

      - name: Upload Gate-1 transparency artifact
        uses: actions/upload-artifact@v6
        with:
          name: gate1-transparency
          path: target/vaa-transparency/gate1/
          if-no-files-found: error

  # Gate-2: opt-in behavioral Verified (count_byte Win64 + --allow-execution).
  semasm-gate2:
    name: Gate-2 SemASM Verified (Win64)
    runs-on: windows-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v6

      - name: Checkout SemASM
        uses: actions/checkout@v6
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM Horizon Closeout tip (H0-H6; decode/lower stay partial).
          ref: ed447fba0496e417cc6f74c707ce5b9b62dd3f14

      - name: Install NASM and LLVM (lld-link)
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        shell: pwsh
        run: |
          $semasmBin = Join-Path $env:GITHUB_WORKSPACE "semasm\target\release"
          if (-not (Test-Path (Join-Path $semasmBin "semasm.exe"))) {
            throw "semasm.exe missing under $semasmBin"
          }
          echo $semasmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$semasmBin;$env:PATH"
          Get-Command semasm | Format-List
          semasm --version

      - name: Doctor + live status compare (R6)
        shell: pwsh
