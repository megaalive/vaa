          ./scripts/ci-gate-sign-setup.ps1 -PublicKeyOut target/vaa-transparency/gate2/public_key.txt
          cargo test --test semasm_gate2_smoke -- --ignored --nocapture

      - name: Export + verify-transparency (Gate-2)
        shell: pwsh
        run: |
          ./scripts/ci-gate-transparency.ps1 `
            -RunBase target/vaa-gate2-runs `
            -OutDir target/vaa-transparency/gate2 `
            -PublicKeySrc target/vaa-transparency/gate2/public_key.txt

      - name: Upload Gate-2 transparency artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate2-transparency
          path: target/vaa-transparency/gate2/
          if-no-files-found: error

  # H3: live HlaX64 emit must match committed candidate, then Gate smokes.
  hlax64-bridge:
    name: HlaX64 emit + SemASM Gate (Win64)
    runs-on: windows-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v4

      - name: Checkout SemASM
        uses: actions/checkout@v4
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM tip (T0–T6 + N4 docs pointer).
          ref: b91ca45b2e63bb83eea603bc522cb0063b5155f4

      - name: Checkout HlaX64
        uses: actions/checkout@v4
        with:
          repository: megaalive/hlax64
          path: hlax64
          # Pin: sum_i64 SemASM/VAA bridge leaf example (H1).
          ref: 4c797893e0714f64faf1ae2f67ddf26c44f06d91

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install NASM and LLVM (lld-link)
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        shell: pwsh
        run: |
          $semasmBin = Join-Path $env:GITHUB_WORKSPACE "semasm\target\release"
          if (-not (Test-Path (Join-Path $semasmBin "semasm.exe"))) {
            throw "semasm.exe missing under $semasmBin"
          }
          echo $semasmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$semasmBin;$env:PATH"
          Get-Command semasm | Format-List
          semasm --version

      - name: Doctor + live status compare (R6)
        shell: pwsh
        run: ./scripts/ci-doctor-live-probe.ps1

      - name: Emit HlaX64 NASM and compare to fixture
        shell: pwsh
        env:
          HLAX64_ROOT: ${{ github.workspace }}/hlax64
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP "hlax64-sum_i64.asm"
          dotnet run --project hlax64/src/HlaX64.Cli --no-launch-profile -- emit-nasm `
            hlax64/examples/interop/semasm-vaa/sum_i64/sum_i64.hla64 `
            --target windows-x64-msabi --output-kind shared-library -o $tmp
          $committed = (Get-Content -Raw fixtures/ingest/hlax64_sum_i64/candidate.asm) -replace "`r`n", "`n"
          $emitted = (Get-Content -Raw $tmp) -replace "`r`n", "`n"
          if ($committed -ne $emitted) {
            Write-Error "Committed candidate.asm drifts from HlaX64 emit-nasm. Run scripts/regen-hlax64-sum_i64.ps1"
          }
          Write-Host "candidate.asm matches HlaX64 emit"

      - name: Gate ingest + Gate-2 verify for hlax64 sum_i64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/vaa-transparency/hlax64-gate1 | Out-Null
          ./scripts/ci-gate-sign-setup.ps1 -PublicKeyOut target/vaa-transparency/hlax64-gate1/public_key.txt
          cargo test --test semasm_gate1_smoke gate1_ingest_hlax64_sum_i64_verify_chain -- --ignored --nocapture
          cargo test --test semasm_gate2_smoke gate2_verify_hlax64_sum_i64_win64_verified -- --ignored --nocapture

      - name: Export + verify-transparency (HlaX64 Gate-1)
        shell: pwsh
        run: |
          ./scripts/ci-gate-transparency.ps1 `
            -RunBase target/vaa-gate1-hlax64-runs `
            -OutDir target/vaa-transparency/hlax64-gate1 `
            -PublicKeySrc target/vaa-transparency/hlax64-gate1/public_key.txt

      - name: Upload HlaX64 Gate-1 transparency artifact
        uses: actions/upload-artifact@v4
        with:
          name: hlax64-gate1-transparency
          path: target/vaa-transparency/hlax64-gate1/
          if-no-files-found: error

  # Gate-1 Linux: live SemASM Incomplete smoke (count_byte/sysv64, no --allow-execution).
  # VAA+SemASM smoke on the pinned SemASM SHA — not a claim SemASM Linux is upstream CI-verified.
  semasm-gate1-linux:
    name: Gate-1 SemASM Incomplete (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v4

      - name: Checkout SemASM
        uses: actions/checkout@v4
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM tip (T0–T6 + N4 docs pointer).
          ref: b91ca45b2e63bb83eea603bc522cb0063b5155f4

      - name: Install NASM and LLVM (ld.lld)
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm lld

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        run: |
          SEMASM_BIN="${GITHUB_WORKSPACE}/semasm/target/release"
          test -x "${SEMASM_BIN}/semasm"
          echo "${SEMASM_BIN}" >> "$GITHUB_PATH"
          export PATH="${SEMASM_BIN}:$PATH"
          command -v semasm
          semasm --version

      - name: Doctor + live status compare (R6)
        run: |
          chmod +x scripts/ci-doctor-live-probe.sh scripts/ci-gate-sign-setup.sh scripts/ci-gate-transparency.sh
          ./scripts/ci-doctor-live-probe.sh

      - name: Record tool versions
        run: |
          nasm --version
          ld.lld --version || lld --version

      - name: Gate-1 Linux signed ingest + Incomplete verify
        run: |
          mkdir -p target/vaa-transparency/gate1-linux
          ./scripts/ci-gate-sign-setup.sh target/vaa-transparency/gate1-linux/public_key.txt
          cargo test --test semasm_gate1_smoke linux -- --ignored --nocapture

      - name: Export + verify-transparency (Gate-1 Linux)
        run: |
          ./scripts/ci-gate-transparency.sh \
            --run-base target/vaa-gate1-linux-runs \
            --out-dir target/vaa-transparency/gate1-linux \
            --public-key-src target/vaa-transparency/gate1-linux/public_key.txt

      - name: Upload Gate-1 Linux transparency artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate1-linux-transparency
          path: target/vaa-transparency/gate1-linux/
          if-no-files-found: error

  # Gate-2 Linux: opt-in behavioral Verified (count_byte sysv64 + --allow-execution).
  semasm-gate2-linux:
