name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features
      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Gate-1: live SemASM Incomplete smoke (count_byte Win64, no --allow-execution).
  # This is NOT a Verified vertical slice — see docs/progress.md.
  semasm-gate1:
    name: Gate-1 SemASM Incomplete (Win64)
    runs-on: windows-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v4

      - name: Checkout SemASM
        uses: actions/checkout@v4
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM tip (T0–T6 + N4 docs pointer).
          ref: b91ca45b2e63bb83eea603bc522cb0063b5155f4

      - name: Install NASM and LLVM (lld-link)
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            semasm

      - name: Build SemASM CLI
        working-directory: semasm
        run: cargo build -p semasm-cli --release

      - name: Put semasm on PATH
        shell: pwsh
        run: |
          $semasmBin = Join-Path $env:GITHUB_WORKSPACE "semasm\target\release"
          if (-not (Test-Path (Join-Path $semasmBin "semasm.exe"))) {
            throw "semasm.exe missing under $semasmBin"
          }
          echo $semasmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$semasmBin;$env:PATH"
          Get-Command semasm | Format-List
          semasm --version

      - name: Doctor + live status compare (R6)
        shell: pwsh
        run: ./scripts/ci-doctor-live-probe.ps1

      - name: Record tool versions
        shell: pwsh
        run: |
          nasm --version
          lld-link --version

      - name: Gate-1 signed ingest + Incomplete verify
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/vaa-transparency/gate1 | Out-Null
          ./scripts/ci-gate-sign-setup.ps1 -PublicKeyOut target/vaa-transparency/gate1/public_key.txt
          cargo test --test semasm_gate1_smoke -- --ignored --nocapture

      - name: Export + verify-transparency (Gate-1)
        shell: pwsh
        run: |
          ./scripts/ci-gate-transparency.ps1 `
            -RunBase target/vaa-gate1-runs `
            -OutDir target/vaa-transparency/gate1 `
            -PublicKeySrc target/vaa-transparency/gate1/public_key.txt

      - name: Upload Gate-1 transparency artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate1-transparency
          path: target/vaa-transparency/gate1/
          if-no-files-found: error

  # Gate-2: opt-in behavioral Verified (count_byte Win64 + --allow-execution).
  semasm-gate2:
    name: Gate-2 SemASM Verified (Win64)
    runs-on: windows-latest
    steps:
      - name: Checkout VAA
        uses: actions/checkout@v4

      - name: Checkout SemASM
        uses: actions/checkout@v4
        with:
          repository: megaalive/semasm
          path: semasm
          # Pin: SemASM tip (T0–T6 + N4 docs pointer).
          ref: b91ca45b2e63bb83eea603bc522cb0063b5155f4

      - name: Install NASM and LLVM (lld-link)
        run: choco install nasm llvm --no-progress -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
