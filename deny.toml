# cargo-deny configuration for VAA.
# See DEPENDENCIES.md for the dependency policy.

[graph]
all-features = true
no-default-features = false

[advisories]
yanked = "warn"
unmaintained = "workspace"
# SoftHSM (P8-K): `rsa` is used only for SPKI encode + public-key verify of
# SoftHSM signatures. Private keys never leave the PKCS#11 module.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
